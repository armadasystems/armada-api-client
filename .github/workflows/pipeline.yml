name: ci-cd

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  source-code-checks:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn -B verify --no-transfer-progress

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: armada-api-client-coverage
          path: target/site/jacoco/
